services:
  # API chính - Smart Campus Access Gate & Core Business
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fit4110-api-lab05
    env_file:
      - .env
    environment:
      SERVICE_NAME: access-gate
      SERVICE_VERSION: ${SERVICE_VERSION:-0.5.0-team-gate}
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - team-internal
      - class-net
    ports:
      - "${APP_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read() else sys.exit(1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # PostgreSQL database
  db:
    image: postgres:15-alpine
    container_name: fit4110-db-lab05
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lab05}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lab05pass}
      POSTGRES_DB: ${POSTGRES_DB:-gatekeeperdb}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - team-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lab05}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # AI service mock
  ai-service:
    image: python:3.11-slim
    container_name: fit4110-ai-lab05
    ports:
      - "9000:9000"
    working_dir: /service
    volumes:
      - ./src/ai_service:/service
    command: >
      sh -c "pip install -r requirements.txt --quiet && python main.py"
    networks:
      - team-internal
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import requests; import sys; sys.exit(0) if requests.get('http://localhost:9000/health').status_code == 200 else sys.exit(1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  team-internal:
    driver: bridge
  class-net:
    driver: bridge

volumes:
  db-data: